<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#14112b" />
    <title>DreamCraft — Offline</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
      body { display: grid; min-height: 100vh; margin: 0; place-items: center; background: radial-gradient(circle at top, #30255f, #060713 62%); color: #f8f2ff; }
      main { width: min(32rem, calc(100% - 3rem)); text-align: center; }
      h1 { margin-bottom: 0.6rem; font-size: clamp(2rem, 8vw, 3.5rem); }
      p { color: #d5ccef; line-height: 1.6; }
      a { display: inline-block; margin-top: 1rem; padding: 0.75rem 1.1rem; border: 1px solid #a797ed; border-radius: 999px; background: #8171d8; color: white; text-decoration: none; }
    </style>
  </head>
  <body>
    <main>
      <h1>The dream is resting.</h1>
      <p>DreamCraft cannot reach the network right now. Reconnect, then return to the world.</p>
      <a href="/">Try again</a>
    </main>
  </body>
</html>

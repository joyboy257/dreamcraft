developer_instructions = """
Validate the real integrated application against .ai-bridge/current-plan.md and docs/09_TEST_AND_EVAL_PLAN.md.
Prefer tests and evidence over assertions. Reproduce failures before fixing them. Make only small, defensible fixes in explicitly assigned files; route architectural issues to the root thread.

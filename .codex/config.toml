# Project-scoped Codex defaults. Live session permission choices still take precedence.
model = "gpt-5.6-sol"
model_reasoning_effort = "medium"
model_verbosity = "low"
plan_mode_reasoning_effort = "high"
sandbox_mode = "workspace-write"
approval_policy = "on-request"

[agents]
max_threads = 6
max_depth = 1
interrupt_message = true

[features]
goals = true

# Keep command network access disabled by default. Enable it deliberately for
# package installation, deployment, or current documentation verification.

<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="500" viewBox="0 0 1280 500" role="img" aria-labelledby="title desc">
  <title id="title">DreamCraft — describe a dream and step into a playable world</title>
  <desc id="desc">A dark violet DreamCraft banner showing a dream prompt flowing into a safe world specification and a playable voxel world.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#100d20"/>
      <stop offset="0.55" stop-color="#19122f"/>
      <stop offset="1" stop-color="#0d1720"/>
    </linearGradient>
    <radialGradient id="violetGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#9c7cff" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#9c7cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mintGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#76d9c0" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#76d9c0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#21183b"/>
      <stop offset="1" stop-color="#121b27"/>
    </linearGradient>
    <filter id="blur" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="42"/>
    </filter>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity="0.48"/>
    </filter>
    <pattern id="stars" width="92" height="76" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="18" r="1" fill="#d8c7ff" opacity="0.28"/>
      <circle cx="61" cy="48" r="1.3" fill="#76d9c0" opacity="0.22"/>
      <circle cx="82" cy="12" r="0.8" fill="#ffffff" opacity="0.18"/>
    </pattern>
  </defs>

  <rect width="1280" height="500" rx="28" fill="url(#bg)"/>
  <rect width="1280" height="500" rx="28" fill="url(#stars)"/>
  <ellipse cx="210" cy="220" rx="300" ry="270" fill="url(#violetGlow)" filter="url(#blur)"/>
  <ellipse cx="1080" cy="290" rx="270" ry="220" fill="url(#mintGlow)" filter="url(#blur)"/>
  <rect x="1" y="1" width="1278" height="498" rx="27" fill="none" stroke="#ffffff" stroke-opacity="0.09"/>

  <g transform="translate(72 58)">
    <rect width="62" height="62" rx="18" fill="#100d20" stroke="#d8c7ff" stroke-opacity="0.25"/>
    <path d="M31 9c1.7 13 7.6 18.9 20.6 20.6C38.6 31.3 32.7 37.2 31 50.2 29.3 37.2 23.4 31.3 10.4 29.6 23.4 27.9 29.3 22 31 9Z" fill="#d8c7ff"/>
    <circle cx="45" cy="17" r="4" fill="#76d9c0"/>
    <text x="86" y="42" fill="#f7f3ff" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="31" font-weight="720" letter-spacing="5">DREAMCRAFT</text>
  </g>

  <g transform="translate(72 170)">
    <text fill="#f7f3ff" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="57" font-weight="680" letter-spacing="-2.4">
      <tspan x="0" y="0">Describe a dream.</tspan>
      <tspan x="0" y="66">Step into the world.</tspan>
    </text>
    <text x="0" y="153" fill="#b7aec8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20">
      Natural language becomes terrain, characters, physics, dialogue,
    </text>
    <text x="0" y="184" fill="#b7aec8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20">
      objectives, and a real ending in a browser-first voxel game.
    </text>

    <g transform="translate(0 224)">
      <rect width="166" height="42" rx="21" fill="#9c7cff" fill-opacity="0.14" stroke="#d8c7ff" stroke-opacity="0.30"/>
      <circle cx="21" cy="21" r="4" fill="#d8c7ff"/>
      <text x="36" y="27" fill="#eee7ff" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="620">Deterministic fallback</text>

      <rect x="180" width="150" height="42" rx="21" fill="#76d9c0" fill-opacity="0.10" stroke="#76d9c0" stroke-opacity="0.28"/>
      <circle cx="201" cy="21" r="4" fill="#76d9c0"/>
      <text x="216" y="27" fill="#dffaf2" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="620">Safe DreamSpec</text>

      <rect x="344" width="146" height="42" rx="21" fill="#ffffff" fill-opacity="0.035" stroke="#ffffff" stroke-opacity="0.09"/>
      <circle cx="365" cy="21" r="4" fill="#f3c86d"/>
      <text x="380" y="27" fill="#ebe8ef" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="620">Playable ending</text>
    </g>
  </g>

  <g transform="translate(770 88)" filter="url(#shadow)">
    <rect width="430" height="326" rx="24" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.10"/>

    <g transform="translate(24 24)">
      <text x="0" y="16" fill="#9b91aa" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">DREAM PROMPT</text>
      <rect x="0" y="30" width="382" height="66" rx="14" fill="#0f0c1b" stroke="#d8c7ff" stroke-opacity="0.16"/>
      <text x="16" y="57" fill="#eee7ff" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13">“A moonlit kitchen where teacups floated</text>
      <text x="16" y="78" fill="#eee7ff" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13">and a patient moth guarded the sugar bowl.”</text>

      <path d="M191 106v25" stroke="#9c7cff" stroke-width="2" stroke-linecap="round"/>
      <path d="M185 125l6 7 6-7" fill="none" stroke="#9c7cff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

      <rect x="0" y="140" width="382" height="62" rx="14" fill="#171126" stroke="#76d9c0" stroke-opacity="0.20"/>
      <text x="16" y="164" fill="#76d9c0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">DreamSpec v1</text>
      <text x="16" y="184" fill="#a9a1b5" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12">schema · references · budgets · spawn safety</text>

      <path d="M191 212v25" stroke="#76d9c0" stroke-width="2" stroke-linecap="round"/>
      <path d="M185 231l6 7 6-7" fill="none" stroke="#76d9c0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

      <g transform="translate(0 246)">
        <rect width="382" height="52" rx="14" fill="#0d1b20" stroke="#76d9c0" stroke-opacity="0.23"/>
        <rect x="16" y="14" width="22" height="22" rx="3" fill="#9c7cff" opacity="0.75"/>
        <rect x="42" y="8" width="26" height="28" rx="3" fill="#76d9c0" opacity="0.74"/>
        <rect x="72" y="18" width="18" height="18" rx="3" fill="#f3c86d" opacity="0.78"/>
        <text x="108" y="31" fill="#f0f8f5" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="650">Playable Three.js voxel world</text>
      </g>
    </g>
  </g>
</svg>
